{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contraseña restablecida</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{% static 'correspondencia/img/matachito-favicon.svg' %}">
    <link rel="stylesheet" href="/static/correspondencia/vendor/css/bootstrap.min.css">
    <style>
        :root {
            --auth-navy: #0d2340;
            --auth-blue: #1c5fd4;
            --auth-cyan: #54b7d8;
            --auth-gold: #d7a441;
            --auth-ink: #102033;
            --auth-muted: #607086;
            --auth-line: rgba(148, 163, 184, 0.24);
            --auth-shadow: 0 34px 84px rgba(13, 35, 64, 0.18);
        }

        * { box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; }

        body.auth-page {
            font-family: "Trebuchet MS", "Lucida Grande", "Segoe UI", sans-serif;
            color: var(--auth-ink);
            background:
                radial-gradient(circle at top left, rgba(84, 183, 216, 0.25), transparent 32%),
                radial-gradient(circle at 85% 18%, rgba(28, 95, 212, 0.16), transparent 28%),
                linear-gradient(140deg, #eef5ff 0%, #f6f9fc 38%, #eef2f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body.auth-page::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(13, 35, 64, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 35, 64, 0.03) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.68), transparent 92%);
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: min(480px, 94vw);
            border-radius: 34px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: var(--auth-shadow);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
        }

        .auth-card-header {
            padding: 2rem 2.2rem 1.2rem;
            background: linear-gradient(160deg, rgba(13, 35, 64, 0.96), rgba(23, 52, 92, 0.92));
            color: #f7fbff;
            text-align: center;
        }

        .auth-card-header h1 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.55rem;
            letter-spacing: -0.03em;
        }

        .auth-card-body {
            padding: 2rem 2.2rem 2.2rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(249, 251, 255, 0.98));
        }

        .auth-card-inner {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.65rem;
            border: 1px solid rgba(226, 232, 240, 0.88);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.2rem;
            background: linear-gradient(135deg, #e6f8ef, #c8f0d8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-icon svg {
            width: 30px;
            height: 30px;
            color: #15b26b;
        }

        .auth-card-inner h2 {
            margin: 0 0 0.6rem;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.3rem;
            color: var(--auth-ink);
        }

        .auth-card-inner p {
            color: var(--auth-muted);
            font-size: 0.92rem;
            line-height: 1.7;
            margin: 0 0 1.2rem;
        }

        .btn-auth-primary {
            min-height: 56px;
            width: 100%;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #133a73 0%, #1c5fd4 56%, #2f82df 100%);
            color: #ffffff;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            box-shadow: 0 18px 28px rgba(28, 95, 212, 0.22);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-auth-primary:hover {
            box-shadow: 0 20px 36px rgba(28, 95, 212, 0.32);
            color: #ffffff;
            text-decoration: none;
        }

        @media (max-width: 540px) {
            .auth-card { border-radius: 22px; }
            .auth-card-body, .auth-card-header { padding: 1.5rem 1.25rem; }
            .auth-card-inner { padding: 1.25rem; }
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <h1>Contraseña restablecida</h1>
        </div>
        <div class="auth-card-body">
            <div class="auth-card-inner">
                <div class="auth-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6L9 17l-5-5"/>
                    </svg>
                </div>
                <h2>Todo listo</h2>
                <p>Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>
                <a href="{% url 'login' %}" class="btn-auth-primary">Iniciar sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
