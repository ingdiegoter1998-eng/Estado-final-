<div class="modal fade interna-destinatarios-modal" id="modalDestinatariosInterna" tabindex="-1" aria-labelledby="modalDestinatariosInternaLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header text-white theme-{{ modal_theme|default:'info' }}">
                <h5 class="modal-title" id="modalDestinatariosInternaLabel">
                    <i class="bi bi-people"></i>
                    Destinatarios de la comunicación
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="modal-interna-info" class="mb-3"></div>
                <div id="modal-interna-destinatarios-lista"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const modalDestinatariosInterna = document.getElementById('modalDestinatariosInterna');
    if (!modalDestinatariosInterna || modalDestinatariosInterna.dataset.bound === '1') {
        return;
    }

    modalDestinatariosInterna.dataset.bound = '1';
    const modalTheme = '{{ modal_theme|default:"info" }}';

    modalDestinatariosInterna.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        if (!button) {
            return;
        }

        const comunicacionId = button.getAttribute('data-comunicacion-id');
        const comunicacionRadicado = button.getAttribute('data-comunicacion-radicado') || 'BORRADOR';
        const comunicacionAsunto = button.getAttribute('data-comunicacion-asunto') || 'Sin asunto';
        const tipoDistribucion = button.getAttribute('data-tipo-distribucion');
        const infoNode = document.getElementById('modal-interna-info');
        const listNode = document.getElementById('modal-interna-destinatarios-lista');

        infoNode.innerHTML = `
            <div class="modal-info-card theme-${modalTheme}">
                <strong>Radicado:</strong> ${comunicacionRadicado}<br>
                <strong>Asunto:</strong> ${comunicacionAsunto}
            </div>
        `;

        let html = '';

        if (tipoDistribucion === 'ENTIDAD') {
            const entidadNombre = button.getAttribute('data-entidad-nombre');
            html = `
                <div class="modal-empty-state">
                    <i class="bi bi-people-fill text-primary d-block mb-3"></i>
                    <h5>Comunicación a toda la entidad</h5>
                    <p class="text-muted mb-0">Esta comunicación fue enviada a todos los funcionarios de <strong>${entidadNombre}</strong>.</p>
                </div>
            `;
        } else if (tipoDistribucion === 'PROCESO') {
            const procesoNombre = button.getAttribute('data-proceso-nombre');
            html = `
                <div class="modal-empty-state">
                    <i class="bi bi-diagram-3-fill text-info d-block mb-3"></i>
                    <h5>Comunicación a proceso completo</h5>
                    <p class="text-muted mb-0">Esta comunicación fue enviada a todos los funcionarios del proceso <strong>${procesoNombre}</strong>.</p>
                </div>
            `;
        } else if (tipoDistribucion === 'OFICINA') {
            const oficinaNombre = button.getAttribute('data-oficina-nombre');
            const usuarioNombre = button.getAttribute('data-usuario-nombre');
            html = `
                <div class="list-group">
                    <div class="list-group-item">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-building-fill fs-3 text-info"></i>
                            <div>
                                <h6 class="mb-1">Oficina destinataria</h6>
                                <p class="mb-0 fw-semibold">${oficinaNombre}</p>
                            </div>
                        </div>
                    </div>
            `;

            if (usuarioNombre) {
                html += `
                    <div class="list-group-item">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-person-fill fs-3 text-primary"></i>
                            <div>
                                <h6 class="mb-1">Usuario específico</h6>
                                <p class="mb-0 fw-semibold">${usuarioNombre}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            html += '</div>';
        } else if (tipoDistribucion === 'USUARIO') {
            const usuarioNombre = button.getAttribute('data-usuario-nombre');
            html = `
                <div class="list-group">
                    <div class="list-group-item">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-person-fill fs-3 text-primary"></i>
                            <div>
                                <h6 class="mb-1">Usuario destinatario</h6>
                                <p class="mb-0 fw-semibold">${usuarioNombre}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        } else if (tipoDistribucion === 'MULTIPLE') {
            const totalDestinatarios = button.getAttribute('data-total-destinatarios');

            listNode.innerHTML = `
                <div class="modal-empty-state">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-3 text-muted mb-0">Cargando ${totalDestinatarios} destinatarios...</p>
                </div>
            `;

            fetch(`/registros/correspondencia/interna/${comunicacionId}/destinatarios-ajax/`, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const destinatarios = data.destinatarios;
                    let listaHtml = '';

                    if (destinatarios.length > 0) {
                        listaHtml = `
                            <div class="modal-info-card mb-3">
                                <strong>Total de destinatarios:</strong> ${destinatarios.length}
                            </div>
                            <div class="list-group">
                        `;

                        destinatarios.forEach((dest) => {
                            const icon = dest.tipo === 'OFICINA' ? 'building-fill' : 'person-fill';
                            const colorClass = dest.tipo === 'OFICINA' ? 'info' : 'primary';
                            const tipoLabel = dest.tipo === 'OFICINA' ? 'Oficina' : 'Usuario';

                            listaHtml += `
                                <div class="list-group-item">
                                    <div class="d-flex align-items-center gap-3">
                                        <i class="bi bi-${icon} fs-3 text-${colorClass}"></i>
                                        <div class="flex-grow-1">
                                            <h6 class="mb-0">${dest.nombre}</h6>
                                            <small class="text-muted">${tipoLabel}</small>
                                        </div>
                                        <span class="badge rounded-pill text-bg-${colorClass}">${tipoLabel}</span>
                                    </div>
                                </div>
                            `;
                        });

                        listaHtml += '</div>';
                    } else {
                        listaHtml = `
                            <div class="modal-empty-state">
                                <i class="bi bi-people text-muted d-block mb-3"></i>
                                <h5>No hay destinatarios registrados</h5>
                                <p class="text-muted mb-0">La comunicación no tiene destinatarios visibles en este momento.</p>
                            </div>
                        `;
                    }

                    listNode.innerHTML = listaHtml;
                } else {
                    listNode.innerHTML = `
                        <div class="alert alert-danger rounded-4 mb-0">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Error al cargar destinatarios: ${data.error || 'Error desconocido'}
                        </div>
                    `;
                }
            })
            .catch(() => {
                listNode.innerHTML = `
                    <div class="alert alert-danger rounded-4 mb-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Error al cargar destinatarios. Por favor, inténtalo de nuevo.
                    </div>
                `;
            });

            return;
        }

        listNode.innerHTML = html;
    });
});
</script>
