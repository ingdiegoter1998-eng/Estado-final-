<!-- Barra de acciones masivas estilo Gmail -->
<div id="massActionsToolbar" class="mass-actions-toolbar" style="display: none;">
    <div class="mass-actions-content">
        <div class="mass-actions-left">
            <span class="selected-count">
                <span id="selectedCount">0</span> elemento(s) seleccionado(s)
            </span>
        </div>
        <div class="mass-actions-right">
            <div class="btn-group">
                <button type="button" class="btn btn-sm btn-outline-primary" id="markAsReadBtn" title="Marcar como leído">
                    <i class="bi bi-envelope-open"></i> Leído
                </button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="markAsUnreadBtn" title="Marcar como no leído">
                    <i class="bi bi-envelope"></i> No leído
                </button>
                <button type="button" class="btn btn-sm btn-outline-success" id="shareSelectedBtn" title="Compartir seleccionados">
                    <i class="bi bi-share"></i> Compartir
                </button>
                <button type="button" class="btn btn-sm btn-outline-danger" id="deleteSelectedBtn" title="Eliminar seleccionados">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </div>
        </div>
    </div>
</div>
