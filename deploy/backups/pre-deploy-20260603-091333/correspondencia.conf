server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    access_log /var/log/nginx/correspondencia.access.log;
    error_log  /var/log/nginx/correspondencia.error.log;

    # Archivos estáticos de Django
    location /static/ {
        alias /home/devdiego/Correspondencia-diciembre-1.0/staticfiles/;

        # JS y CSS: cache corto con revalidación obligatoria
        location ~* \.(?:js|css)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Imágenes/fuentes: cache largo
        location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        allow all;
    }

    # Archivos de media de Django
    location /media/ {
        alias /home/devdiego/Correspondencia-diciembre-1.0/media/;
        expires off;
        allow all;
    }

    # Assets internos de Next.js (_next/static, _next/image, favicon)
    location /_next/ {
        allow all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache agresivo para assets Next.js (tienen hash en nombre)
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # App Next.js (Calendario de Informes)
    location /calendario {
        allow all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # App Next.js (Monitoreo Correspondencia)
    location /monitoreo {
        allow all;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Assets Next.js Monitoreo (_next con basePath /monitoreo)
    location /monitoreo/_next/ {
        allow all;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django (todo lo demás)
    location / {
        allow all;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/correspondencia/gunicorn.sock:;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
